<script>
    let currentWords = [];

    document.addEventListener("DOMContentLoaded", function() {
        loadTheme();
    });

    async function loadTheme() {
        const selectEl = document.getElementById('themeSelect');
        if (!selectEl) return;
        const key = selectEl.value;
        const titleText = selectEl.options[selectEl.selectedIndex].text;
        
        document.getElementById('mainTitle').textContent = `📝 Wortschatz - ${titleText.split(' ')[0]}`;

        const container = document.getElementById('tableContainer');
        if (container) container.innerHTML = '<span class="loading-text">Načítám data...</span>';

        const basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
        const parentPath = basePath.substring(0, basePath.lastIndexOf('/'));
        
        const primaryUrl = `${window.location.origin}${parentPath}/data/${key}.json`;
        const backupUrl = `${window.location.origin}${parentPath}/${key}.json`;

        try {
            let response = await fetch(primaryUrl);
            if (!response.ok) response = await fetch(backupUrl);
            if (!response.ok) throw new Error("Soubor s daty nebyl znalezen.");

            const data = await response.json();
            let rawData = data[key] || data.words || data;
            
            if (rawData && !Array.isArray(rawData) && typeof rawData === 'object') {
                const firstKey = Object.keys(rawData).find(k => Array.isArray(rawData[k]));
                currentWords = firstKey ? rawData[firstKey] : [];
            } else if (Array.isArray(rawData)) {
                currentWords = rawData;
            } else {
                currentWords = [];
            }

            renderData();
        } catch (err) {
            console.error(err);
            if (container) container.innerHTML = `<span style="color:red;">Chyba při načítání: ${err.message}</span>`;
        }
    }

    function renderData() {
        const copyArea = document.getElementById('copyArea');
        const container = document.getElementById('tableContainer');
        
        if (currentWords.length === 0) {
            copyArea.value = "";
            container.innerHTML = "Žádná slovíčka k dispozici.";
            return;
        }

        let textLines = [];
        let tableHtml = `<table><thead><tr><th>Německy</th><th>Česky</th></tr></thead><tbody>`;

        currentWords.forEach(item => {
            const deWord = item.artikel ? `${item.artikel} ${item.de}` : (item.de || "");
            const czWord = item.cz || ""; // OPRAVENO: z cs na cz
            
            textLines.push(`${deWord}\t${czWord}`);
            tableHtml += `<tr><td><strong>${deWord}</strong></td><td>${czWord}</td></tr>`;
        });

        tableHtml += `</tbody></table>`;
        
        copyArea.value = textLines.join('\n');
        container.innerHTML = tableHtml;
    }

    function copyToClipboard() {
        const copyArea = document.getElementById('copyArea');
        copyArea.select();
        copyArea.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyArea.value);
        
        alert("Slovíčka byla zkopírována do schránky! Můžeš je vložit do Wordwallu.");
    }

    // Pomocná funkce pro zamíchání pole (Fisher-Yates)
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function exportToBlooketCSV() {
        if (currentWords.length === 0) return;

        // Všechny dostupné české překlady pro generování falešných odpovědí
        const allCzAnswers = currentWords.map(item => item.cz || "").filter(txt => txt !== "");

        // Hlavička Blooket šablony pro Multiple Choice
        let csvLines = ["Question,Answer,Choice 1,Choice 2,Choice 3,Choice 4,Time Limit"];
        
        currentWords.forEach(item => {
            const deWord = item.artikel ? `${item.artikel} ${item.de}` : (item.de || "");
            const correctCz = item.cz || "";
            
            // Vyfiltrujeme ostatní slovíčka kromě toho správného
            let wrongChoices = allCzAnswers.filter(ans => ans !== correctCz);
            // Zamícháme je a vezmeme první 3 jako distraktory
            shuffle(wrongChoices);
            
            let choice1 = wrongChoices[0] || "";
            let choice2 = wrongChoices[1] || "";
            let choice3 = wrongChoices[2] || "";
            let choice4 = ""; // Čtvrtou možnost můžeme nechat prázdnou, nebo pokud je dost slovíček, dosadit další
            if (wrongChoices.length > 3) {
                choice4 = wrongChoices[3];
            }

            // Ošetření uvozovek pro bezpečné CSV
            const escapeCsv = (str) => `"${str.replace(/"/g, '""')}"`;

            const q = escapeCsv(deWord);
            const a = escapeCsv(correctCz);
            const c1 = escapeCsv(choice1);
            const c2 = escapeCsv(choice2);
            const c3 = escapeCsv(choice3);
            const c4 = escapeCsv(choice4);
            const timeLimit = "20";

            csvLines.push(`${q},${a},${c1},${c2},${c3},${c4},${timeLimit}`);
        });

        // Spojení řádků s BOM pro správné kódování češtiny v Excelu/Blooketu
        const csvContent = "\uFEFF" + csvLines.join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        
        const selectEl = document.getElementById('themeSelect');
        const key = selectEl ? selectEl.value : 'slovnicek';
        
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `blooket-${key}.csv`);
        document.body.appendChild(link);
        
        link.click();
        document.body.removeChild(link);
    }
</script>
