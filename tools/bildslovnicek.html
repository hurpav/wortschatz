<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildwörterbuch v1.1 - Obrázkový slovníček</title>
    <style>
        :root {
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --bg: #f0fdfa;
            --card: #ffffff;
            --text: #1f2937;
            --border: #ccfbf1;
            --border-dark: #99f6e4;
            
            /* Barvy pro německé členy */
            --der-color: #0284c7;  /* Modrá */
            --die-color: #dc2626;  /* Červená */
            --das-color: #16a34a;  /* Zelená */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border-dark);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-dark);
            padding-bottom: 5px;
            color: var(--primary);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            background: #fff;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            height: 42px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #64748b;
        }
        .btn-secondary:hover {
            background: #475569;
        }

        .flex-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        /* Styly pro barevné členy v náhledu */
        .badge-der { color: var(--der-color); font-weight: bold; }
        .badge-die { color: var(--die-color); font-weight: bold; }
        .badge-das { color: var(--das-color); font-weight: bold; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th, table td {
            border: 1px solid #cbd5e1;
            padding: 10px;
            text-align: left;
        }

        table th {
            background-color: #f1f5f9;
            font-weight: 600;
        }

        .error-box {
            color: #b91c1c;
            font-weight: bold;
            padding: 15px;
            border: 1px solid #fca5a5;
            background: #fef2f2;
            border-radius: 6px;
            margin-top: 10px;
        }

        .success-box {
            color: #047857;
            padding: 12px;
            border: 1px solid #a7f3d0;
            background: #ecfdf5;
            border-radius: 6px;
            font-weight: 500;
        }

        .loading-text {
            color: var(--primary);
            font-style: italic;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>🖼️ Bildwörterbuch - Obrázkový slovníček v1.1</h1>
        <p>Generátor pracovních listů s nastavitelným formátem (2x A5 na šířku nebo 1x velká A4 na výšku).</p>
    </header>

    <div class="card">
        <h2>1. Nastavení a rozsah tisku</h2>
        
        <div class="grid-3">
            <div>
                <label for="themeSelect">Zvolit téma:</label>
                <select id="themeSelect" onchange="loadTheme()">
                    <option value="schulsachen.json">Schulsachen (Pomůcky)</option>
                    <option value="familie.json">Familie (Rodina)</option>
                    <option value="berufe.json">Berufe (Povolání)</option>
                    <option value="hobbys.json">Hobbys (Záliby)</option>
                    <option value="sport.json">Sportarten (Sporty)</option>
                    <option value="wochentage.json">Wochentage (Dny v týdnu)</option>
                    <option value="essen.json">Essen (Jídlo)</option>
                    <option value="stundenplan.json">Stundenplan / Monate</option>
                </select>
            </div>

            <div>
                <label for="formatSelect">Formát výsledku:</label>
                <select id="formatSelect">
                    <option value="2xA5">2x A5 (na šířku A4)</option>
                    <option value="1xA4">1x velká A4 (na výšku)</option>
                </select>
            </div>

            <div>
                <label>Rozsah ID slovíček:</label>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="number" id="rangeFrom" value="1" min="1" onchange="renderPreview()" style="text-align: center;">
                    <span>až</span>
                    <input type="number" id="rangeTo" value="12" min="1" onchange="renderPreview()" style="text-align: center;">
                </div>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Podoba slovíčku:</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="modeSelect" value="portfolio" checked onchange="renderPreview()">
                    📁 Portfolio
                </label>
                <label class="radio-option">
                    <input type="radio" name="modeSelect" value="practice" onchange="renderPreview()">
                    📝 Procvičování
                </label>
            </div>
        </div>

        <label>Slovíčka vybraná k tisku:</label>
        <div id="statusContainer">
            <span class="loading-text">Čekám na načtení dat...</span>
        </div>
    </div>

    <div class="card">
        <h2>Živý náhled barevného slovníčku</h2>
        <div id="previewContainer">
            <span class="loading-text">Vyberte téma pro zobrazení náhledu...</span>
        </div>
    </div>

    <div class="flex-actions">
        <button class="btn" onclick="generatePDF()">🖨️ Vygenerovat PDF</button>
        <a href="../index.html" style="text-decoration: none;">
            <button class="btn btn-secondary" type="button">🏠 Dashboard</button>
        </a>
    </div>
</div>

<script>
    const GH_USER = "hurpav";
    const GH_REPO = "wortschatz";
    const BASE_URL_DATA = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/data/`;

    let currentWords = [];

    document.addEventListener("DOMContentLoaded", function() {
        loadTheme();
    });

    async function loadTheme() {
        const selectEl = document.getElementById('themeSelect');
        if (!selectEl) return;
        const filename = selectEl.value;

        const statusContainer = document.getElementById('statusContainer');
        if (statusContainer) statusContainer.innerHTML = '<span class="loading-text">Načítám data z GitHubu...</span>';

        const primaryUrl = `${BASE_URL_DATA}${filename}?_ts=${new Date().getTime()}`;
        const backupUrl = `data/${filename}`;

        try {
            let response = await fetch(primaryUrl);
            if (!response.ok) response = await fetch(backupUrl);
            if (!response.ok) throw new Error("Soubor se slovíčky nebyl nalezen.");

            const data = await response.json();
            const key = filename.replace('.json', '');
            let rawData = data[key] || data.words || data;
            
            if (Array.isArray(rawData)) {
                currentWords = rawData;
            } else if (rawData && typeof rawData === 'object') {
                const firstKey = Object.keys(rawData).find(k => Array.isArray(rawData[k]));
                currentWords = firstKey ? rawData[firstKey] : [];
            } else {
                currentWords = [];
            }

            if (statusContainer) {
                statusContainer.innerHTML = `<div class="success-box">✓ Úspěšně načteno ${currentWords.length} slovíček z tématu.</div>`;
            }

            // Nastavení automatického rozsahu podle počtu nalezených slovíček
            document.getElementById('rangeTo').value = currentWords.length;
            
            renderPreview();
        } catch (err) {
            console.error(err);
            if (statusContainer) {
                statusContainer.innerHTML = `
                    <div class="error-box">
                        ❌ Chyba načítání: Data nelze stáhnout lokálně. Spusťte VS Code Live Server nebo uložte změny na GitHub.
                        <span style="font-size:0.8rem; display:block; font-weight:normal; margin-top:4px;">Detail: ${err.message}</span>
                    </div>`;
            }
        }
    }

    // Funkce, která obarví členy der/die/das do HTML podoby
    function formatGermanWordWithColors(item) {
        const artikel = (item.artikel || item.ARTIKEL || "").trim().toLowerCase();
        const deWord = (item.de || item.DE || "").trim();

        if (artikel === "der") {
            return `<span class="badge-der">der</span> ${deWord}`;
        } else if (artikel === "die") {
            return `<span class="badge-die">die</span> ${deWord}`;
        } else if (artikel === "das") {
            return `<span class="badge-das">das</span> ${deWord}`;
        }
        
        return artikel ? `${artikel} ${deWord}` : deWord;
    }

    function renderPreview() {
        const previewContainer = document.getElementById('previewContainer');
        if (currentWords.length === 0) {
            previewContainer.innerHTML = "Žádná data k zobrazení.";
            return;
        }

        const from = parseInt(document.getElementById('rangeFrom').value) || 1;
        const to = parseInt(document.getElementById('rangeTo').value) || currentWords.length;
        const mode = document.querySelector('input[name="modeSelect"]:checked').value;

        // Výběr slovíček v zadaném rozsahu indexů
        const selected = currentWords.slice(from - 1, to);

        let html = `<table><thead><tr><th>ID</th><th>Německy (Barevně)</th><th>Česky</th></tr></thead><tbody>`;
        
        selected.forEach((item, index) => {
            const id = from + index;
            const deFormatted = formatGermanWordWithColors(item);
            // V režimu procvičování schováme český překlad, v portfoliu ho ukážeme
            const cz
