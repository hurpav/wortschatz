<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generátor Obrázkového Slovníčku</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #0f766e; --bg: #f0fdfa; --border: #cbd5e1; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .word-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🖼️ Bildwörterbuch</h1>
    <div>
        <label>Téma:</label>
        <select id="themeSelect" onchange="loadTheme()">
            <option value="schulsachen">Schulsachen</option>
            <option value="familie">Familie</option>
        </select>
    </div>
    <div id="wordsContainer" class="word-list">Načítám...</div>
    <button class="btn" onclick="generatePDF()">Vygenerovat PDF</button>
</div>

<script>
    let activeItems = [];
    let activeImages = [];

    async function loadTheme() {
        const key = document.getElementById('themeSelect').value;
        const container = document.getElementById('wordsContainer');
        try {
            const response = await fetch(`../data/${key}.json`);
            const data = await response.json();
            activeItems = data[key] || data.words || [];
            activeImages = activeItems.map(i => i.image ? `../${i.image}` : `../images/unknown.png`);
            container.innerHTML = "Data načtena.";
        } catch(e) {
            container.innerHTML = "❌ Chyba načítání z ../data/" + key + ".json";
        }
    }

    function loadImage(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = url;
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
        });
    }

    async function generatePDF() {
        if (activeItems.length === 0) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
        
        const loadedImages = await Promise.all(activeImages.map(url => loadImage(url)));

        function drawHalf(offsetX) {
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(14);
            doc.text("BILDWÖRTERBUCH", offsetX + 10, 15);
            
            activeItems.forEach((item, idx) => {
                const r = Math.floor(idx / 3);
                const c = idx % 3;
                const x = offsetX + 10 + (c * 45);
                const y = 30 + (r * 32);
                
                doc.rect(x, y, 41, 28);
                if (loadedImages[idx]) doc.addImage(loadedImages[idx], 'PNG', x + 5, y + 5, 30, 15);
                
                doc.setFontSize(9);
                let text = (item.artikel ? item.artikel + " " : "") + item.de;
                doc.text(text, x + 20, y + 25, { align: "center" });
            });
        }

        drawHalf(0);
        doc.line(148.5, 0, 148.5, 210);
        drawHalf(148.5);

        doc.save("slovnicek.pdf");
    }

    loadTheme();
</script>
</body>
</html>
