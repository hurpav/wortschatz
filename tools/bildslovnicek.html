<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildwörterbuch v1.1 - Obrázkový slovníček</title>
    <style>
        :root {
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --bg: #f0fdfa;
            --card: #ffffff;
            --text: #1f2937;
            --border: #ccfbf1;
            --border-dark: #99f6e4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border-dark);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-dark);
            padding-bottom: 5px;
            color: var(--primary);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            background: #fff;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            height: 42px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #64748b;
        }
        .btn-secondary:hover {
            background: #475569;
        }

        .flex-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        /* Styl chybového hlášení přesně podle tvého screenshotu */
        .error-box {
            color: #b91c1c;
            font-weight: bold;
            padding: 15px;
            border: 1px solid #fca5a5;
            background: #fef2f2;
            border-radius: 6px;
            margin-top: 10px;
        }

        .error-url {
            font-size: 0.85rem;
            font-weight: normal;
            color: #991b1b;
            display: block;
            margin-top: 5px;
            word-break: break-all;
        }

        .success-box {
            color: #047857;
            padding: 12px;
            border: 1px solid #a7f3d0;
            background: #ecfdf5;
            border-radius: 6px;
            font-weight: 500;
        }

        .loading-text {
            color: var(--primary);
            font-style: italic;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>🖼️ Bildwörterbuch - Obrázkový slovníček v1.1</h1>
        <p>Generátor pracovních listů s nastavitelným formátem (2x A5 na šířku nebo 1x velká A4 na výšku).</p>
    </header>

    <div class="card">
        <h2>1. Nastavení a rozsah tisku</h2>
        
        <div class="grid-3">
            <div>
                <label for="themeSelect">Zvolit téma:</label>
                <select id="themeSelect" onchange="loadTheme()">
                    <option value="schulsachen.json">Schulsachen (Pomůcky)</option>
                    <option value="familie.json">Familie (Rodina)</option>
                    <option value="berufe.json">Berufe (Povolání)</option>
                    <option value="hobbys.json">Hobbys (Záliby)</option>
                    <option value="sport.json">Sportarten (Sporty)</option>
                    <option value="wochentage.json">Wochentage (Dny v týdnu)</option>
                    <option value="essen.json">Essen (Jídlo)</option>
                    <option value="stundenplan.json">Stundenplan / Monate</option>
                </select>
            </div>

            <div>
                <label for="formatSelect">Formát výsledku:</label>
                <select id="formatSelect">
                    <option value="2xA5">2x A5 (na šířku A4)</option>
                    <option value="1xA4">1x velká A4 (na výšku)</option>
                </select>
            </div>

            <div>
                <label>Rozsah ID slovíček:</label>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="number" id="rangeFrom" value="1" min="1" style="text-align: center;">
                    <span>až</span>
                    <input type="number" id="rangeTo" value="10" min="1" style="text-align: center;">
                </div>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Podoba slovíčku:</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="modeSelect" value="portfolio" checked>
                    📁 Portfolio
                </label>
                <label class="radio-option">
                    <input type="radio" name="modeSelect" value="practice">
                    📝 Procvičování
                </label>
            </div>
        </div>

        <label>Slovíčka vybraná k tisku:</label>
        <div id="statusContainer">
            <span class="loading-text">Čekám na načtení dat...</span>
        </div>
