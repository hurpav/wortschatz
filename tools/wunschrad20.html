<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wunschrad - Kolo štěstí</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 10px; }

        .container {
            display: flex;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            margin-top: 20px;
        }

        .panel {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            flex: 1;
        }

        .wheel-area {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #fullscreen-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--background);
            padding: 20px;
            border-radius: 12px;
        }

        #fullscreen-container:fullscreen {
            width: 100vw;
            height: 100vh;
            background: #111827;
            color: white;
        }

        .wheel-wrapper {
            position: relative;
            width: 450px;
            height: 450px;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        select, input, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--secondary); }
        .btn-spin { background-color: #10b981; font-size: 18px; padding: 15px; margin-top: 15px;}
        .btn-spin:hover { background-color: #059669; }
        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-archive { background-color: #6b7280; margin-top: 10px; }
        .btn-archive:hover { background-color: #4b5563; }

        .filter-box {
            background-color: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed var(--border);
            margin-top: 10px;
        }

        .student-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px;
            margin-bottom: 15px;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid #f1f5f9;
        }

        .student-item.excluded {
            color: #94a3b8;
            background-color: #f8fafc;
        }

        .student-item button {
            width: auto;
            padding: 2px 8px;
            margin: 0;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .status-sync { background-color: #d1fae5; color: #065f46; }
        .status-saving { background-color: #fef3c7; color: #92400e; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            color: var(--text);
        }
    </style>
</head>
<body>

    <h1>Wunschrad 🎯</h1>
    
    <div class="container">
        <div class="panel">
            <div id="status-indicator" class="status-badge status-saving">Načítání dat ze serveru...</div>
            
            <h3>Výběr třídy</h3>
            <label for="class-select">Třída:</label>
            <select id="class-select" disabled>
                <option value="">-- Načítám třídy --</option>
            </select>

            <div class="filter-box">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-top:0;">
                    <input type="checkbox" id="filter-enable" style="width:auto; margin:0;"> 
                    <strong>Aktivovat filtr zkoušení</strong>
                </label>
                
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <div style="flex:1;">
                        <span style="font-size:12px;">Zkoušen od (měsíc):</span>
                        <select id="filter-month-from" style="margin-bottom:0; padding:5px;">
                            <option value="09">09 (Září)</option>
                            <option value="10">10 (Říjen)</option>
                            <option value="11">11 (Listopad)</option>
                            <option value="12">12 (Prosinec)</option>
                            <option value="01">01 (Leden)</option>
                            <option value="02">02 (Únor)</option>
                            <option value="03">03 (Březen)</option>
                            <option value="04">04 (Duben)</option>
                            <option value="05">05 (Květen)</option>
                            <option value="06">06 (Červen)</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <span style="font-size:12px;">Do (měsíc):</span>
                        <select id="filter-month-to" style="margin-bottom:0; padding:5px;">
                            <option value="09">09 (Září)</option>
                            <option value="10">10 (Říjen)</option>
                            <option value="11" selected>11 (Listopad)</option>
                            <option value="12">12 (Prosinec)</option>
                            <option value="01">01 (Leden)</option>
                            <option value="02">02 (Únor)</option>
                            <option value="03">03 (Březen)</option>
                            <option value="04">04 (Duben)</option>
                            <option value="05">05 (Květen)</option>
                            <option value="06">06 (Červen)</option>
                        </select>
                    </div>
                </div>
            </div>

            <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border);">

            <h3>Seznam žáků</h3>
            <div class="student-list" id="students-container"></div>

            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <input type="text" id="new-student-vn" placeholder="Vorname">
                <input type="text" id="new-student-fn" placeholder="Familienname">
                <button id="btn-add-student" style="width: auto;">Přidat</button>
            </div>

            <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border);">

            <h3>Lokální záloha</h3>
            <button id="btn-export" class="btn-archive">📥 Stáhnout záložní JSON do PC</button>
        </div>

        <div class="panel wheel-area">
            <div id="fullscreen-container">
                <div class="wheel-wrapper">
                    <div class="pointer"></div>
                    <canvas id="wheel" width="450" height="450"></canvas>
                </div>
                <button id="btn-spin" class="btn-spin">ROZTOČIT KOLO 🚀</button>
            </div>
        </div>
    </div>

    <div class="modal" id="grade-modal">
        <div class="modal-content">
            <h2 id="modal-student-name">Vybraný žák</h2>
            <label for="grade-input">Známka:</label>
            <input type="text" id="grade-input" placeholder="Např. 1, 2-, N...">

            <label for="date-input">Datum zkoušení:</label>
            <input type="date" id="date-input">

            <button id="btn-save-grade" class="btn-spin" style="margin-top: 10px;">Uložit hodnocení</button>
            <button id="btn-close-modal" class="btn-danger" style="margin-top: 5px;">Zavřít bez uložení</button>
        </div>
    </div>

    <script>
        const DATA_URL = '/wortschatz/data/klassen_data.json';
        
        let database = {};
        let currentClass = "";
        let isSpinning = false;
        let selectedStudentIndex = null; // index v AKTIVNÍM (vyfiltrovaném) seznamu
        let activeStudentsList = [];     // pomocné pole pro aktuálně zobrazené žáky na kole

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const classSelect = document.getElementById('class-select');
        const studentsContainer = document.getElementById('students-container');
        const fullscreenContainer = document.getElementById('fullscreen-container');
        const gradeModal = document.getElementById('grade-modal');
        const statusIndicator = document.getElementById('status-indicator');

        // Prvky filtru
        const filterEnable = document.getElementById('filter-enable');
        const filterMonthFrom = document.getElementById('filter-month-from');
        const filterMonthTo = document.getElementById('filter-month-to');

        // --- POMOCNÁ FUNKCE PRO OVĚŘENÍ ZKOUŠENÍ V TERMÍNU ---
        function isStudentExcluded(student) {
            if (!filterEnable.checked) return false;
            if (!student.historie || student.historie.length === 0) return false;

            const fromVal = parseInt(filterMonthFrom.value);
            const toVal = parseInt(filterMonthTo.value);

            return student.historie.some(h => {
                if (!h.datum) return false;
                // Formát data je YYYY-MM-DD, vytáhneme MM (měsíc)
                const parts = h.datum.split('-');
                if (parts.length < 2) return false;
                const mVal = parseInt(parts[1]);

                // Ošetření školního roku (přechod přes prosinec/leden)
                if (fromVal <= toVal) {
                    return mVal >= fromVal && mVal <= toVal;
                } else {
                    // Pokud by se filtrovalo např. od listopadu (11) do února (02)
                    return mVal >= fromVal || mVal <= toVal;
                }
            });
        }

        // --- NAČTENÍ A UKLÁDÁNÍ ---
        async function loadDataFromServer() {
            try {
                showStatus('Načítání dat...', 'saving');
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error('Nepodařilo se načíst soubor.');
                database = await response.json();
                updateClassSelect();
                showStatus('Data synchronizována se serverem', 'sync');
            } catch (err) {
                if (localStorage.getItem('kolo_stesti_local')) {
                    database = JSON.parse(localStorage.getItem('kolo_stesti_local'));
                    updateClassSelect();
                    showStatus('Načtena lokální data (Server nedostupný)', 'saving');
                } else {
                    showStatus('Chyba při stahování dat ze serveru', 'saving');
                }
                console.error(err);
            }
        }

        async function saveData() {
            localStorage.setItem('kolo_stesti_local', JSON.stringify(database));
            try {
                showStatus('Ukládání na server...', 'saving');
                const response = await fetch(DATA_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(database, null, 4)
                });
                if(response.ok) {
                    showStatus('Data synchronizována se serverem', 'sync');
                } else {
                    showStatus('Uloženo pouze lokálně v prohlížeči', 'saving');
                }
            } catch (err) {
                showStatus('Chyba serveru – uloženo lokálně', 'saving');
                console.error(err);
            }
        }

        function showStatus(text, type) {
            statusIndicator.textContent = text;
            statusIndicator.className = `status-badge status-${type}`;
        }

        // --- ZVUKY ---
        function playTickSound() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(550, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playWinSound() {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i*0.12);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i*0.12);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.12 + 0.25);
                osc.start(audioCtx.currentTime + i*0.12);
                osc.stop(audioCtx.currentTime + i*0.12 + 0.25);
            });
        }

        function updateClassSelect() {
            classSelect.innerHTML = '<option value="">-- Vyberte třídu --</option>';
            Object.keys(database).forEach(className => {
                let opt = document.createElement('option');
                opt.value = className;
                opt.textContent = className;
                classSelect.appendChild(opt);
            });
            classSelect.disabled = false;
        }

        // --- VYGENEROVÁNÍ ROZHRANÍ A SEZNAMŮ ---
        function renderStudents() {
            studentsContainer.innerHTML = "";
            activeStudentsList = [];
            if (!currentClass || !database[currentClass]) {
                drawWheel();
                return;
            }

            database[currentClass].forEach((student, index) => {
                const excluded = isStudentExcluded(student);
                
                // Pokud žák není vyloučen, přidáme ho do osudí kola štěstí
                if (!excluded) {
                    activeStudentsList.push({
                        studentRef: student,
                        originalIndex: index
                    });
                }

                let div = document.createElement('div');
                div.className = `student-item ${excluded ? 'excluded' : ''}`;
                
                let infoText = `${student.vorname} ${student.familienname}`;
                if (excluded) {
                    infoText += ` <strong>[Mimo kolo]</strong>`;
                } else if (student.historie && student.historie.length > 0) {
                    let posledni = student.historie[student.historie.length - 1];
                    infoText += ` (${posledni.datum} -> ${posledni.známka})`;
                }

                div.innerHTML = `
                    <span><strong>[ID ${student.id}]</strong> ${infoText}</span>
                    <button class="btn-danger" onclick="removeStudent(${index})">❌</button>
                `;
                studentsContainer.appendChild(div);
            });

            drawWheel();
        }

        window.removeStudent = function(index) {
            database[currentClass].splice(index, 1);
            database[currentClass].forEach((s, idx) => s.id = idx);
            saveData();
            renderStudents();
        }

        // --- KRESLENÍ KOLA ŠTĚSTÍ ---
        function drawWheel() {
            const numSegments = activeStudentsList.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) {
                ctx.fillStyle = "#cbd5e1";
                ctx.beginPath();
                ctx.arc(225, 225, 200, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = "#1e293b";
                ctx.font = "16px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(currentClass ? "Všichni žáci odfiltrováni / bez žáků" : "Vyberte třídu", 225, 225);
                return;
            }

            const arcSize = (2 * Math.PI) / numSegments;
            const colors = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#ec4899", "#14b8a6", "#6366f1"];

            activeStudentsList.forEach((item, i) => {
                const angle = i * arcSize;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(225, 225);
                ctx.arc(225, 225, 220, angle, angle + arcSize);
                ctx.lineTo(225, 225);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(225, 225);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(`${item.studentRef.vorname} ${item.studentRef.familienname.substring(0,1)}.`, 200, 5);
                ctx.restore();
            });
        }

        // --- TOČENÍ ---
        function spinWheel() {
            const numSegments = activeStudentsList.length;
            if (numSegments === 0 || isSpinning) return;

            isSpinning = true;
            
            if (fullscreenContainer.requestFullscreen) {
                fullscreenContainer.requestFullscreen().catch(err => console.log(err));
            }

            const randDegrees = Math.floor(Math.random() * 360) + 2880; 
            canvas.style.transform = `rotate(${randDegrees}deg)`;

            let tickCount = 0;
            let tickInterval = setInterval(() => {
                if (tickCount < 45) {
                    playTickSound();
                    tickCount++;
                } else {
                    clearInterval(tickInterval);
                }
            }, 85);

            setTimeout(() => {
                isSpinning = false;
                
                const actualDegrees = randDegrees % 360;
                const correctedDegrees = (360 - actualDegrees + 270) % 360;
                const segmentDegrees = 360 / numSegments;
                selectedStudentIndex = Math.floor(correctedDegrees / segmentDegrees) % numSegments;

                playWinSound();

                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(err => console.log(err));
                }

                setTimeout(() => {
                    openGradeModal(activeStudentsList[selectedStudentIndex].studentRef);
                }, 500);

                canvas.style.transition = 'none';
                canvas.style.transform = `rotate(${actualDegrees}deg)`;
                setTimeout(() => {
                    canvas.style.transition = 'transform 4s cubic-bezier(0.1, 0.8, 0.25, 1)';
                }, 50);

            }, 4000);
        }

        function openGradeModal(student) {
            document.getElementById('modal-student-name').textContent = `${student.vorname} ${student.familienname}`;
            document.getElementById('grade-input').value = "";
            document.getElementById('date-input').value = new Date().toISOString().split('T')[0];
            gradeModal.style.display = "flex";
            document.getElementById('grade-input').focus();
        }

        document.getElementById('btn-save-grade').addEventListener('click', () => {
            const grade = document.getElementById('grade-input').value.trim();
            const date = document.getElementById('date-input').value;

            if (grade && selectedStudentIndex !== null) {
                // Správný zápis přímo do objektu studenta skrze referenci
                const targetStudent = activeStudentsList[selectedStudentIndex].studentRef;
                if(!targetStudent.historie) targetStudent.historie = [];
                
                targetStudent.historie.push({
                    "známka": grade,
                    "datum": date
                });
                
                saveData();
                renderStudents();
            }
            gradeModal.style.display = "none";
        });

        document.getElementById('btn-close-modal').addEventListener('click', () => {
            gradeModal.style.display = "none";
        });

        classSelect.addEventListener('change', (e) => {
            currentClass = e.target.value;
            renderStudents();
        });

        document.getElementById('btn-add-student').addEventListener('click', () => {
            const vnInput = document.getElementById('new-student-vn');
            const fnInput = document.getElementById('new-student-fn');
            const vn = vnInput.value.trim();
            const fn = fnInput.value.trim();
            
            if (vn && fn && currentClass) {
                const nextId = database[currentClass].length;
                database[currentClass].push({
                    "id": nextId,
                    "jmeno": `${vn} ${fn}`,
                    "vorname": vn,
                    "familienname": fn,
                    "historie": []
                });
                vnInput.value = "";
                fnInput.value = "";
                saveData();
                renderStudents();
            }
        });

        document.getElementById('btn-spin').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            spinWheel();
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(database, null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "klassen_data.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        // Event listenery pro změnu filtrů (okamžitě překreslí rozhraní)
        filterEnable.addEventListener('change', renderStudents);
        filterMonthFrom.addEventListener('change', renderStudents);
        filterMonthTo.addEventListener('change', renderStudents);

        // Prvotní spuštění
        loadDataFromServer();
    </script>
</body>
</html>
